info:
  name: 支付异步通知（支付宝支付）
  type: http
  seq: 8

http:
  method: POST
  url: "{{host}}/rest/payments/:gateway/notify"
  params:
    - name: gateway
      value: alipay_page
      type: path
  body:
    type: form-urlencoded
    data:
      - name: trade_status
        value: TRADE_CLOSED
      - name: out_trade_no
        value: "1850114024793357"
      - name: total_amount
        value: "2.00"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
